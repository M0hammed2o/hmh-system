services:
  db:
    image: postgres:15-alpine
    container_name: hmh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hmh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hmhdev}
      POSTGRES_DB: ${POSTGRES_DB:-hmh_system}
    ports:
     - "55432:5432"
    volumes:
      - hmh_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hmh} -d ${POSTGRES_DB:-hmh_system}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hmh_postgres_data:
    driver: local
